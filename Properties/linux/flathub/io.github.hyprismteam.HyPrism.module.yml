
modules:

  - name: HyPrism
    buildsystem: simple
    build-commands:
      - mkdir -p /app/lib/i386-linux-gnu/codecs-extra
      - install -d /app/HyPrism
      # We will have a single command for both local Flatpak build and Flathub as the directory structure is sightly different between them
      - cp -R wwwroot /app/wwwroot || cp -R linux-unpacked/wwwroot /app/wwwroot && rm -rf linux-unpacked/wwwroot 
      - cp -R linux-unpacked/* /app/HyPrism
      - chmod +x /app/HyPrism/chrome-sandbox /app/HyPrism/HyPrism
      - install -Dm755 Properties/linux/flatpak/hyprism-launcher-wrapper.sh /app/bin/hyprism-launcher-wrapper
      - install -Dm644 Properties/linux/flatpak/io.github.hyprismteam.HyPrism.png /app/share/icons/hicolor/256x256/apps/io.github.hyprismteam.HyPrism.png
      - install -Dm644 Properties/linux/flatpak/io.github.hyprismteam.HyPrism.desktop /app/share/applications/io.github.hyprismteam.HyPrism.desktop
      - install -Dm644 Properties/linux/flatpak/io.github.hyprismteam.HyPrism.metainfo.xml /app/share/metainfo/io.github.hyprismteam.HyPrism.metainfo.xml
      - ln -s /app/HyPrism/HyPrism /app/bin/HyPrism
    sources:
      - type: git
        url:  https://github.com/hyprismteam/HyPrism
        branch: main
      - type: archive
        url: HYPRISM_RELEASE_URL
        sha256: HYPRISM_RELEASE_SHA256
        dest: linux-unpacked